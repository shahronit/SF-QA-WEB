      <stop offset="0%"  stop-color="#7B61FF"/>
      <stop offset="55%" stop-color="#FF3D8B"/>
      <stop offset="100%" stop-color="#43E5F4"/>
    </linearGradient>
    <radialGradient id="a-hi" cx="35%" cy="30%" r="55%">
