version: "3.9"

services:
  app:
    build: .
    container_name: sf-qa-studio
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - app_projects:/app/projects
      - app_kb:/app/knowledge_base
      - app_rag:/app/rag/vector_store

volumes:
  app_data:
  app_logs:
  app_projects:
  app_kb:
  app_rag:
