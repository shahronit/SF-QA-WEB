# =============================================================================
# QA Studio (sf-qa-web) — Render Blueprint
# =============================================================================
# Deploys the FastAPI backend + bundled React SPA as a single Docker web service.
#
# 1.  In the Render dashboard, click "New" -> "Blueprint" and point it at this
#     repo (https://github.com/shahronit/SF-QA-WEB). Render reads this file and
#     provisions everything below.
# 2.  Open the new service -> "Environment" and fill in the secret values that
#     are intentionally left as `sync: false` here (API keys, JWT secret).
# 3.  Optional: enable Firestore (recommended for multi-user / production):
#       a. Set STORAGE_BACKEND=firestore  in the dashboard.
#       b. Set FIREBASE_PROJECT_ID         to your Firebase project id.
#       c. Provide credentials ONE of two ways:
#          - EASY:  Paste the entire service-account JSON into the
#                   FIREBASE_CREDENTIALS_JSON env var (recommended).
#          - FILE:  Render dashboard -> Environment -> "Secret Files" ->
#                   add file at e.g. /etc/secrets/firebase.json, then set
#                   FIREBASE_CREDENTIALS_PATH=/etc/secrets/firebase.json
#       The app accepts whichever you provide; if both are set, the JSON env
#       var wins. With Firestore enabled the persistent disk below is no
#       longer required (you can remove the `disk:` block to save cost).
#
# IMPORTANT — enabling the Cursor CLI provider on Render:
#   The Docker image installs cursor-agent at /root/.local/bin/, but the
#   binary needs Cursor credentials to talk to Cursor's inference API.
#   Cursor Pro has no headless API key (only Enterprise Service Accounts
#   do), so we hydrate ~/.cursor at container start from a Render Secret
#   File. Workflow:
#       1. On a Linux machine (or WSL): `curl https://cursor.com/install -fsS | bash`
#       2. `cursor-agent login` and complete the browser OAuth.
#       3. `tar -C ~/.cursor -czf cursor-auth.tgz .`
#       4. Render dashboard -> service -> Environment -> Secret Files ->
#          Add file at mount path /etc/secrets/cursor-auth.tgz, upload tgz.
#       5. Trigger a manual redeploy. Logs should show
#          "[boot] Cursor credentials hydrated from /etc/secrets/cursor-auth.tgz".
#   Without that file, Cursor calls fail and the orchestrator falls back
#   to Gemini automatically. See start.sh for the hydration logic.
#
# Notes:
#  - The app gracefully degrades when RAG is empty, so you can deploy without
#    Ollama. To enable RAG, run an external Ollama (with the nomic-embed-text
#    model) and set OLLAMA_HOST in this service.
#  - The "starter" plan (512 MB) is enough for Gemini-only workloads. The
#    cursor-agent subprocess can push memory close to the cap; if you see
#    OOM kills in the Render logs, bump to "standard" (2 GB).
# =============================================================================

services:
  - type: web
    name: qa-studio-web
    runtime: docker
    plan: starter
    region: oregon
    branch: master
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # ---- Server ---------------------------------------------------------
      - key: PORT
        value: "10000"

      # ---- Auth -----------------------------------------------------------
      - key: JWT_SECRET
        generateValue: true            # Render generates a random secret once
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "480"

      # ---- LLM provider (Gemini + Cursor CLI; OpenAI removed) -------------
      # Default provider for unattended runs. Per-user/per-agent
      # routing in the admin panel can override this at request time.
      - key: LLM_PROVIDER
        value: gemini

      - key: GEMINI_API_KEY
        sync: false                    # set in dashboard, never committed
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.5-flash,gemini-2.0-flash
      - key: GEMINI_MAX_RETRIES
        value: "3"

      # Cursor CLI: binary is baked into the Docker image at
      # /root/.local/bin/cursor-agent and PATH is set so subprocess
      # finds it. Auto-discovery in backend/routers/deps.py picks it
      # up; leave CURSOR_AGENT_BIN blank so a stale value never
      # overrides the discovered path. Authentication is hydrated
      # from a Render Secret File at /etc/secrets/cursor-auth.tgz —
      # see the comment block at the top of this file.
      - key: CURSOR_AGENT_BIN
        value: ""
      - key: CURSOR_AGENT_MAX_RETRIES
        value: "2"
      - key: CURSOR_AGENT_DISCOVER
        value: "true"

      # ---- RAG ------------------------------------------------------------
      - key: RAG_TOP_K
        value: "3"
      - key: MAX_OUTPUT_TOKENS
        value: "8192"
      - key: TEMPERATURE
        value: "0.25"

      # Optional: external Ollama for RAG embeddings (nomic-embed-text).
      # - key: OLLAMA_HOST
      #   value: https://ollama.your-domain.com

      # ---- Storage backend ------------------------------------------------
      # Default = local files on the attached disk below.
      # To switch to Firestore set STORAGE_BACKEND=firestore in the dashboard
      # and supply credentials via EITHER FIREBASE_CREDENTIALS_JSON (raw JSON
      # env var, recommended) OR FIREBASE_CREDENTIALS_PATH (path to a Secret
      # File you upload in the Render UI).
      - key: STORAGE_BACKEND
        value: local
      - key: FIREBASE_PROJECT_ID
        sync: false                    # e.g. qa-studio-prod
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false                    # paste the full service-account JSON
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false                    # only if you use Render Secret Files

    # Persistent disk for users.json, projects, knowledge base and the Chroma
    # vector store. Render mounts this at the listed path; the app already
    # creates these subdirectories on startup (see backend/main.py lifespan).
    disk:
      name: qa-studio-data
      mountPath: /app/data
      sizeGB: 1
